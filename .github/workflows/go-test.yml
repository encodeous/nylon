name: Go Test

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "README.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "README.md"

permissions:
  contents: read

env:
  GO_VERSION: "1.26.3"

jobs:
  unit_test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run unit test
        run: go run gotest.tools/gotestsum@latest -- --race -tags=router_test ./...
  integration:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run integration
        run: go run gotest.tools/gotestsum@latest -- --race -tags=integration ./integration/...
  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Get CPU core count
        id: cpu
        run: echo "cores=$(nproc)" >> $GITHUB_OUTPUT
      - name: Run e2e
        run: |
          go run gotest.tools/gotestsum@latest -- \
            -tags=e2e ./e2e/... \
            -parallel ${{ steps.cpu.outputs.cores }}
